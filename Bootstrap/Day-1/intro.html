<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BS-Intro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>
<style>
    .card:hover{
        transform: scale(0.9);
    }
    .form-control:focus{
        background-color: aquamarine;
    }
</style>
<body class="p-3 mb-2 bg-warning-subtle text-warning-emphasis">
    <div class="p-3 mb-2 bg-primary-subtle text-primary-emphasis">
         <h1 class="bg-info">welcome</h1>
<p class="lead">
  This is a lead paragraph. It stands out from regular paragraphs.
</p>
    </div>
    <div class="card" style="width: 18rem;">
  <img src="../../CSS/Assert/Images/hair1.jpg" class="card-img-top" alt="...">
  <div class="card-body">
    <h5 class="card-title">Hair clip</h5>
    <p class="card-text">Rs.200 </p>
    <a href="#" class="btn btn-primary">See More</a>
  </div>
</div>
<div class="mb-3 row">
  <label for="staticEmail" class="col-sm-2 col-form-label">Email</label>
  <div class="col-sm-10">
    <input type="text" readonly class="form-control-plaintext" id="staticEmail" value="email@example.com">
  </div>
</div>
<div class="mb-3 row">
  <label for="inputPassword" class="col-sm-2 col-form-label">Password</label>
  <div class="col-sm-10">
    <input type="password" class="form-control" id="inputPassword">
  </div>
</div>
   
    
</body>
</html>
