<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 flex justify-center items-center min-h-screen">

    <div class="bg-white shadow-lg rounded-xl p-6 flex flex-col items-center w-80 hover:scale-105 transition duration-300">

        <!-- Profile Image -->
        <img
            src="../../CSS/Assert/Images/ChatGPT Image May 29, 2026, 12_32_47 AM.png"
            alt="Profile"
            class="w-32 h-32 rounded-full object-cover mb-4"
        >

        <!-- Name -->
        <h2 class="text-2xl font-bold">
            Abinaya J
        </h2>

        <!-- Role -->
        <p class="text-gray-600 mb-4">
            Front-End Developer
        </p>

        <!-- Follow Button -->
        <button class="bg-blue-500 text-white px-6 py-2 rounded-lg hover:bg-blue-600 transition">
            Follow
        </button>

    </div>

</body>
</html>
