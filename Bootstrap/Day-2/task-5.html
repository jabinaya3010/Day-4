<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 p-8">

    <h1 class="text-4xl font-bold text-center mb-8">
        Image Gallery
    </h1>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">

        <div class="overflow-hidden rounded-lg">
            <img src="https://picsum.photos/400/300?1"
                 alt="Image 1"
                 class="w-full h-64 object-cover hover:scale-110 transition duration-300">
        </div>

        <div class="overflow-hidden rounded-lg">
            <img src="https://picsum.photos/400/300?2"
                 alt="Image 2"
                 class="w-full h-64 object-cover hover:scale-110 transition duration-300">
        </div>

        <div class="overflow-hidden rounded-lg">
            <img src="https://picsum.photos/400/300?3"
                 alt="Image 3"
                 class="w-full h-64 object-cover hover:scale-110 transition duration-300">
        </div>

        <div class="overflow-hidden rounded-lg">
            <img src="https://picsum.photos/400/300?4"
                 alt="Image 4"
                 class="w-full h-64 object-cover hover:scale-110 transition duration-300">
        </div>

        <div class="overflow-hidden rounded-lg">
            <img src="https://picsum.photos/400/300?5"
                 alt="Image 5"
                 class="w-full h-64 object-cover hover:scale-110 transition duration-300">
        </div>

        <div class="overflow-hidden rounded-lg">
            <img src="https://picsum.photos/400/300?6"
                 alt="Image 6"
                 class="w-full h-64 object-cover hover:scale-110 transition duration-300">
        </div>

    </div>

</body>
</html>
