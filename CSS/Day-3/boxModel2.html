<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nested Boxes</title>
<style>
    .box1{
        width:300px;
        height:300px;
        background:lightblue;
        padding:20px;
    }

    .box2{
        width:200px;
        height:200px;
        background:lightgreen;
        padding:20px;
    }

    .box3{
        width:100px;
        height:100px;
        background:lightcoral;
    }
</style>
</head>
<body>

<div class="box1">
    Box 1
    <div class="box2">
        Box 2
        <div class="box3">
            Box 3
        </div>
    </div>
</div>

</body>
</html>
