<!-- 3. Login and Signup Form -->
<!DOCTYPE html>
<html>
<head>
    <title>Login and Signup Form</title>
</head>
<body>

<h2>Signup Form</h2>

<form>
    Username:
    <input type="text" required minlength="3" maxlength="15" placeholder="Enter username"><br><br>

    Email:
    <input type="email" required placeholder="Enter email"><br><br>

    Password:
    <input type="password" required minlength="6" maxlength="12" placeholder="Enter password"><br><br>

    <input type="submit" value="Signup">
</form>

<hr>

<h2>Login Form</h2>

<form>
    Email:
    <input type="email" required placeholder="Enter email"><br><br>

    Password:
    <input type="password" required placeholder="Enter password"><br><br>

    <input type="submit" value="Login">
</form>

</body>
</html>
