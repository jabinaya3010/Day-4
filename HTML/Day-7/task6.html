<!-- 6. Resume Builder Form -->
<!DOCTYPE html>
<html>
<head>
    <title>Resume Builder Form</title>
</head>
<body>

<h2>Resume Builder Form</h2>

<form>

<h3>Personal Details</h3>

Name:
<input type="text"><br><br>

Email:
<input type="email"><br><br>

Phone:
<input type="tel"><br><br>

<h3>Education Details</h3>

College Name:
<input type="text"><br><br>

Degree:
<input type="text"><br><br>

<h3>Skills</h3>

<textarea rows="4" cols="40"></textarea><br><br>

<h3>Experience</h3>

<textarea rows="4" cols="40"></textarea><br><br>

<h3>Upload Resume</h3>

<input type="file"><br><br>

<input type="submit" value="Submit Resume">

</form>

</body>
</html>
