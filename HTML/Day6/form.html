<html>
    <head>
        <title>Form</title>
    </head>
    <body>
        <center>
        <form>
        <h1>Ration Card Form</h1>
        <label>Enter Name:</label><br>
        <input type="text" required placeholder="Capital letter">
        <br>
        <label>Enter email:</label><br>
        <input type="email" required placeholder="eg: abc@gmail.com">
        <br>
        <label>Enter Phone No:</label><br>
        <input type="tel" maxlength="10" minlength="1"required placeholder="10 digit">
        <br>
        <label>Gender:</label><br>
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female
        <input type="radio" name="gender"> Other<br>
        <label>Enter Father's Name:</label><br>
        <input type="text" required placeholder="Captital letter">
        <br>
        <label>Enter Mother's Name:</label><br>
        <input type="text" required placeholder="Captial letter">
        <br>
        <label>Enter Address:</label><br>
        <textarea rows="4" cols="30"></textarea><br>
        <h1>Government Details</h1>
        <label>Aadhaar Number:</label><br>
        <input type="number" required="Enter Aadhaar number"><br>
        <label>Pan card Number:</label><br>
        <input type="number" required="Enter Pancard number"><br>
        <label>Upload Document(any one):</label><br>
        <input type="file"><br>
        <h4>Declaration</h4>
        <input type="checkbox">
         I hereby declare that the above information is true.<br>
        <input type="submit" value="Submit Application">
        <input type="reset" value="Reset Form">
        </form>
    </center>
    </body>
</html>
