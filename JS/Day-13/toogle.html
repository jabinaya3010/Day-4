<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>toogle</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div class="flex justify-center items-center p-5 flex-col text-center gap-3">
         <div>
            <input id="mis" type="text" placeholder="enter" class="border">
        </div>
        <div>
            <button  onclick="clickShow()" class="rounded bg-blue-500 ">Click Me</button>
        </div>
       
        <div  id="box" style="display:flex" class="bg-pink-600 flex justify-center rounded p-5 w-20">
            box
        </div>
    </div>
    <script>
        const clickValue=document.getElementById("box")
            clickValue.style.display="none"
            const mistake = document.getElementById("mis")
           const clickShow=()=>{
            if(mistake.value==="show"){
                clickValue.style.display="flex"
            }
            else if(mistake.value==="hide"){
                clickValue.style.display="none"
            }
           }
        

    

    </script>
</body>
</html>
