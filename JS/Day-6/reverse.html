<script>
    //string reverse
    let hero = "vijay";
    let b=""
    for(let i=hero.length-1;i>=0;i--){
        b+=hero[i]; 
    }
    console.log(b);
    //reversev array
    let her = ["vijay","ajith","vjs"];
    let n=[]
    let index=0
    for(let i=her.length-1;i>=0;i--){
        n[index]=her[i]
        index++ 
    }
    console.log(n);
    
</script>
