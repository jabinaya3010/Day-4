let movies = [
    {
        movie: "GOAT",
        collection: 800
    },
    {
        movie: "Leo",
        collection: 600
    },
    {
        movie: "Master",
        collection: 500
    }
];


let totalCollection = 0;


let highestMovie = movies[0];

for(let i = 0; i < movies.length; i++) {
    totalCollection += movies[i].collection;

    if(movies[i].collection > highestMovie.collection) {
        highestMovie = movies[i];
    }
}

console.log("Total Collection:", totalCollection);
console.log("Highest Collection:", highestMovie.collection);
console.log("Movie Name with Highest Collection:", highestMovie.movie);
